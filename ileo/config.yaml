name: ILEO
version: 0.1.12
slug: ileo
description: Sync ILEO water readings with Home Assistant Energy statistics
url: https://github.com/GsCbo/home-assistant-ileo
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
homeassistant_api: true
map:
  - type: addon_config
    read_only: false
options:
  username: null
  password: null
  start_date: "current_year"
  sync_interval_hours: 4
  mode: sync
  meter_names: ""
schema:
  username: str
  password: password
  start_date: str
  sync_interval_hours: int(1,168)
  mode: list(sync|reset)
  meter_names: str?
